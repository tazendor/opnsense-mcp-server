services:
  opnsense-mcp:
    build: .
    image: opnsense-mcp:latest
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    environment:
      OPNSENSE_TRANSPORT: http
      OPNSENSE_HTTP_HOST: "0.0.0.0"
      OPNSENSE_HTTP_PORT: "8000"
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
